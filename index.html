<!doctype html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=EB+Garamond:wght@400;500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<body>

<div id="stage">
  <div id="loadbar" aria-hidden="true"></div>
  <canvas id="gl"></canvas>
  <div id="labelLayer" aria-hidden="true"></div>

  <header id="masthead">
    <h1 class="title">Gorgon Collection</h1>
    <p class="tagline">The face the ancient world carved to ward off harm &mdash; guardian and
    monster by turns, reimagined by every age that inherited her. Impossible to look away from.</p>
    <p class="note">3D printed &amp; painted by hand.</p>
  </header>

  <p id="hint" class="mono">[ click to find out more ]</p>

  <div id="brand">
    <img src="assets/ckd-logo.png" alt="CKD">
    <span>clay &amp; kelsy designs</span>
  </div>

  <div id="fallback" hidden>
    <h1 class="title">Gorgon Collection</h1>
    <ul id="fallbackList"></ul>
  </div>

  <div id="flash" aria-hidden="true"></div>
</div>

<script type="module" src="app.js?v=35"></script>
