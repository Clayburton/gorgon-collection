<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#efe5d3">
<title>Shop Clay &amp; Kelsy Designs — CKDesign</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏺</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=EB+Garamond:wght@400;500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<!-- THE IMPORT MAP MUST COME BEFORE ANY modulepreload — preloads-before-map
     resolve "too late" from cache and the module dies silently. -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
  }
}
</script>
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js">
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/loaders/GLTFLoader.js">
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/libs/meshopt_decoder.module.js">
<link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/environments/RoomEnvironment.js">
<!-- the three relics start downloading with the HTML (50–130KB each) -->
<link rel="preload" as="fetch" crossorigin fetchpriority="high" href="assets/medusa.glb?v=1">
<link rel="preload" as="fetch" crossorigin fetchpriority="high" href="assets/hero.glb?v=1">
<link rel="preload" as="fetch" crossorigin fetchpriority="high" href="assets/vessel.glb?v=1">
</head>
<body>

<a id="stage" href="https://clayandkelsy.com/design/" target="_top"
   aria-label="Shop Clay and Kelsy Designs — see the collections">
  <canvas id="gl" aria-hidden="true"></canvas>

  <div id="copy">
    <p class="kicker mono">[ ckdesign &mdash; 3d printed &amp; painted by hand ]</p>
    <h1 class="title">Shop Clay &amp;<br>Kelsy Designs</h1>
    <p class="blurb">Gorgons, wanderers, and the symbols of the mysteries &mdash; each
    piece drawn from an ancient original, then printed and painted by hand.
    Three collections, and more coming.</p>
    <span class="cta mono">[ see the collections ]</span>
  </div>

  <div id="brand" aria-hidden="true">
    <img src="../assets/ckd-logo.png" alt="">
  </div>

  <div id="flash" aria-hidden="true"></div>
</a>

<script type="module" src="app.js?v=6"></script>
</body>
</html>
