<!-- CKDesign — The Odyssey · WordPress Custom HTML block.
     Paste this WHOLE file into one Custom HTML block, DIRECTLY BELOW the
     Gorgon Collection block on /design/. The iframe grows to fit the
     collection column on phones (the page posts its height up as ckdCol —
     a distinct key so the two collection iframes never resize each other).

     LOWER collection block: keeps loading="lazy" so it doesn't even start
     downloading until the visitor scrolls near it — the top block gets the
     whole connection first. Every future collection block added below also
     uses loading="lazy" (only the FIRST block on the page loads eagerly). -->
<style>
  #ckd-odyssey{ width:100vw; margin-left:calc(50% - 50vw); margin-right:calc(50% - 50vw); }
  #ckd-odyssey iframe{ display:block; width:100%; height:100svh; height:100dvh; border:0; }
</style>
<div id="ckd-odyssey">
  <iframe id="ckd-odyssey-frame"
          src="https://clayburton.github.io/gorgon-collection/odyssey/"
          title="The Odyssey — CKDesign"
          loading="lazy"
          allow="fullscreen"></iframe>
</div>
<script>
  (function () {
    var frame = document.getElementById('ckd-odyssey-frame');
    addEventListener('message', function (e) {
      if (e.origin !== 'https://clayburton.github.io') return;
      var d = e.data || {};
      if (d.ckdCol === 'odyssey' && typeof d.h === 'number' && d.h > 200 && d.h < 12000) {
        frame.style.height = Math.round(d.h) + 'px';
      }
    });
  })();
</script>

<!-- ============================================================
     SHARED CKD FADE-TO-WHITE — paste this IDENTICAL block inside
     EVERY CKD Custom HTML block on the page. It installs once (guard
     below), listens for {ckd:'flash'} from any CKD iframe, and fades
     the WHOLE viewport white — so clicking an object in one block
     fades every other block (and any peeking sliver) with it.
     The pageshow reset is REQUIRED: the browser's back button restores
     this page from cache exactly as it was left — overlay still white —
     so without the reset the page comes back as a stuck white sheet.
     Pure CSS opacity, GPU-composited, zero JS per frame — no lag.
     ============================================================ -->
<script>
  (function () {
    if (window.__ckdFlash) return;              // install once per page
    window.__ckdFlash = true;
    var ov = document.createElement('div');
    ov.setAttribute('aria-hidden', 'true');
    ov.style.cssText =
      'position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;' +
      'z-index:2147483647;transition:opacity .32s ease;';
    (document.body || document.documentElement).appendChild(ov);
    function clearOv () {
      ov.style.transition = 'none';             // snap clear — no fade on the way back
      ov.style.opacity = '0';
      ov.style.pointerEvents = 'none';
      requestAnimationFrame(function () {
        requestAnimationFrame(function () { ov.style.transition = 'opacity .32s ease'; });
      });
    }
    addEventListener('message', function (e) {
      if (e.origin !== 'https://clayburton.github.io') return;
      if (e.data && e.data.ckd === 'flash') {
        ov.style.pointerEvents = 'auto';
        ov.style.opacity = '1';
      }
    });
    // back/forward restores the page WITH the overlay still white — always clear it
    addEventListener('pageshow', clearOv);
    // safety valve: if the overlay is ever stuck, a click/tap dismisses it
    ov.addEventListener('click', clearOv);

    // keep the page at the TOP while the collection blocks grow during load —
    // on phones the growing iframes otherwise leave the page scrolled
    // mid-collection. Disarms the instant the visitor touches/scrolls, and
    // retires 6s after load, so it can never fight a real scroll.
    var moved = false, t0 = Date.now();
    ['touchstart', 'wheel', 'keydown', 'pointerdown'].forEach(function (ev) {
      addEventListener(ev, function () { moved = true; }, { once: true, passive: true });
    });
    function pinTop () {
      if (!moved && Date.now() - t0 < 6000 && scrollY > 0) scrollTo(0, 0);
    }
    addEventListener('message', function (e) {
      if (e.origin !== 'https://clayburton.github.io') return;
      var d = e.data || {};
      if (d.ckd === 'height' || d.ckdCol) setTimeout(pinTop, 60);
    });
    addEventListener('load', function () { setTimeout(pinTop, 120); });
  })();
</script>
